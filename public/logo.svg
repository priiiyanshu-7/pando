<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#62B8FF"/>
      <stop offset="1" stop-color="#2E90F5"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect x="6" y="6" width="500" height="500" rx="116" fill="url(#sky)"/>
  <!-- clouds -->
  <g fill="#FFFFFF" opacity="0.85">
    <ellipse cx="388" cy="118" rx="58" ry="22"/>
    <ellipse cx="346" cy="128" rx="34" ry="16"/>
    <ellipse cx="96" cy="430" rx="60" ry="22"/>
    <ellipse cx="150" cy="440" rx="34" ry="15"/>
  </g>

  <!-- panda -->
  <g stroke="#22262E" stroke-width="11" stroke-linejoin="round">
    <!-- ears -->
    <circle cx="166" cy="182" r="58" fill="#2A2D34"/>
    <circle cx="346" cy="182" r="58" fill="#2A2D34"/>
    <!-- head -->
    <path d="M256 168
             C336 168 410 222 410 312
             C410 392 340 446 256 446
             C172 446 102 392 102 312
             C102 222 176 168 256 168 Z" fill="#FBFBF8"/>
  </g>
  <!-- inner ears -->
  <circle cx="166" cy="188" r="30" fill="#1A1C22"/>
  <circle cx="346" cy="188" r="30" fill="#1A1C22"/>

  <!-- eye patches -->
  <g fill="#23262E">
    <ellipse cx="206" cy="306" rx="41" ry="54" transform="rotate(-17 206 306)"/>
    <ellipse cx="306" cy="306" rx="41" ry="54" transform="rotate(17 306 306)"/>
  </g>
  <!-- eyes -->
  <g fill="#FFFFFF">
    <ellipse cx="214" cy="304" rx="11" ry="17"/>
    <ellipse cx="298" cy="304" rx="11" ry="17"/>
  </g>

  <!-- nose -->
  <path d="M232 348 Q256 343 280 348 Q276 372 256 380 Q236 372 232 348 Z" fill="#23262E"/>
  <!-- smile -->
  <path d="M256 380 Q256 396 240 402 M256 380 Q256 396 272 402" stroke="#23262E" stroke-width="9" stroke-linecap="round" fill="none"/>
</svg>
